<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAM ENGINE: The VU Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0f172a]">

    <div id="pause-overlay" style="display:none;" class="fixed inset-0 z-[10000] bg-white/80 backdrop-blur-md flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-2xl text-center border-t-8 border-blue-600 max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-4">Test Paused ⏸️</h2>
            <p class="text-gray-600 mb-8">Your timer and progress are suspended.</p>
            <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg" onclick="resumeTest()">Resume Test</button>
        </div>
    </div>

    <div id="lock-screen" style="display: flex;" class="fixed inset-0 z-[9999] bg-[#0f172a] items-center justify-center p-4">
        <div class="relative bg-slate-800/80 backdrop-blur-xl border border-slate-700 p-12 rounded-3xl shadow-2xl w-full max-w-xl text-center">
            <div class="w-20 h-20 mx-auto bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
                <span class="text-3xl font-black text-white">VU</span>
            </div>
            <h2 class="text-4xl font-black text-white mb-2">EXAM ENGINE</h2>
            <p class="text-blue-400 font-bold tracking-widest uppercase text-sm mb-8">Secure Access Portal</p>
            <div class="relative mb-8 text-left">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Access Key</label>
                <div class="relative flex items-center">
                    <input type="password" id="pin-input" class="w-full bg-slate-900/80 border border-slate-600 text-white px-6 py-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-xl tracking-widest" placeholder="••••••••">
                    <button onclick="togglePassword()" id="eye-icon" class="absolute right-4 text-2xl">👁️</button>
                </div>
            </div>
            <button id="unlock-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all" onclick="verifyPin()">Initialize Engine</button>
        </div>
    </div>

    <div id="home-screen" style="display: none;" class="h-full w-full bg-gradient-to-br from-[#181B2D] to-[#09111A] flex flex-col overflow-hidden">
        <header class="w-full bg-[#181B2D]/95 backdrop-blur-md border-b border-[#394054] p-5 flex items-center justify-between z-50">
            <div class="flex items-center gap-4">
                <img id="home-logo" src="VU-logo.jpg" class="w-14 h-14 rounded-xl border border-white/10">
                <div>
                    <h1 class="text-2xl font-bold text-white leading-tight">EXAM ENGINE</h1>
                    <div id="db-stats" class="text-xs text-gray-400">Loading Intelligence...</div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="default-lang-select" onchange="saveTestState()" class="bg-slate-800 text-white px-3 py-2 rounded-lg outline-none">
                    <option value="hi">Hindi</option><option value="en">English</option>
                </select>
                <button onclick="lockEngine()" class="bg-red-500/10 text-red-400 border border-red-500/30 p-2 rounded-full">🔒</button>
            </div>
        </header>
        <main class="flex-1 overflow-y-auto p-6 space-y-6">
            <button class="w-full bg-gradient-to-r from-purple-800 to-indigo-700 py-10 rounded-2xl text-white font-black text-3xl shadow-xl" onclick="openRevisionPage()">THE VU REVISION</button>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-3 bg-slate-800/40 p-6 rounded-2xl border border-slate-700 flex justify-between items-center">
                    <h3 class="text-indigo-200 font-bold">Cloud Sync</h3>
                    <div class="flex gap-2">
                        <button onclick="pushToCloud()" class="border border-amber-400 text-amber-400 px-6 py-2 rounded-xl">Push</button>
                        <button onclick="pullFromCloud()" class="border border-sky-400 text-sky-400 px-6 py-2 rounded-xl">Restore</button>
                    </div>
                 </div>
                 <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700 text-center">
                    <h3 class="text-yellow-300 font-bold mb-4">Full Mock</h3>
                    <button onclick="startExam('mock','all')" class="w-full border border-yellow-500 text-yellow-400 py-3 rounded-xl">Start Mock</button>
                 </div>
                 <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700 text-center">
                    <h3 class="text-pink-300 font-bold mb-2">Sprint</h3>
                    <select id="sprint-subject" class="mb-4 bg-slate-900 text-white p-2 rounded w-full"></select>
                    <button onclick="startExam('sprint', document.getElementById('sprint-subject').value)" class="w-full border border-pink-500 text-pink-400 py-3 rounded-xl">Start Sprint</button>
                 </div>
                 <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700 text-center">
                    <h3 class="text-green-300 font-bold mb-2">Practice</h3>
                    <select id="practice-subject" class="mb-4 bg-slate-900 text-white p-2 rounded w-full"></select>
                    <button onclick="startExam('practice', document.getElementById('practice-subject').value)" class="w-full border border-green-500 text-green-400 py-3 rounded-xl">Start Practice</button>
                 </div>
                 <button onclick="startCalculationMode()" class="md:col-span-3 border border-purple-500 text-purple-400 py-4 rounded-2xl font-black text-xl">START CALC DRILLS</button>
            </div>
        </main>
    </div>

    <div id="analysis-screen" style="display: none;" class="!h-full !w-full !bg-[#0a0310] flex-col !overflow-hidden">
        <header class="p-5 border-b border-purple-900/50 flex justify-between items-center bg-[#130724]">
            <button onclick="goHomeAlert()" class="bg-purple-900/30 text-purple-200 border border-purple-700 px-4 py-2 rounded-xl text-sm font-bold">Dashboard</button>
            <div class="text-xl font-black text-white">VU || ANALYTICS</div>
            <button onclick="startReviewMode()" class="bg-fuchsia-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Solutions</button>
        </header>
        <main class="flex-1 overflow-y-auto p-6">
            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
                    <div class="bg-purple-900/20 p-5 rounded-xl text-center border border-purple-500/30"><div class="text-xs text-purple-300 mb-1">SCORE</div><div id="dash-score" class="text-4xl font-black text-white">0</div></div>
                    <div class="bg-emerald-900/20 p-5 rounded-xl text-center border border-emerald-500/30"><div class="text-xs text-emerald-300 mb-1">CORRECT</div><div id="dash-correct" class="text-4xl font-black text-emerald-400">0</div></div>
                    <div class="bg-rose-900/20 p-5 rounded-xl text-center border border-rose-500/30"><div class="text-xs text-rose-300 mb-1">WRONG</div><div id="dash-wrong" class="text-4xl font-black text-rose-400">0</div></div>
                </div>
                <div id="detailed-stats-area"></div>
                <div class="mt-10 bg-black p-5 rounded-xl border border-purple-800"><textarea id="insight-text" readonly class="w-full bg-transparent text-emerald-400 font-mono h-32 outline-none"></textarea></div>
            </div>
        </main>
    </div>

    <div id="cbt-screen" style="display: none;" class="flex-col h-full bg-white">
        <header class="p-4 border-b flex justify-between items-center">
            <button onclick="goHomeAlert()" class="bg-gray-100 p-2 rounded">🏠 Home</button>
            <div id="timer" class="text-xl font-mono font-bold bg-blue-100 px-4 py-1 rounded">00:00</div>
            <button onclick="submitExamManually()" class="bg-green-600 text-white px-6 py-1 rounded font-bold">Submit</button>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <div class="flex-1 p-10 overflow-y-auto">
                <div class="text-sm font-bold text-blue-600 mb-2">Question <span id="q-num-display">1</span></div>
                <div id="q-text" class="text-xl mb-8 leading-relaxed">Loading...</div>
                <div id="options-container" class="space-y-4"></div>
                <div class="mt-10 flex gap-4">
                    <button onclick="loadPrevious()" class="border px-8 py-2 rounded">Previous</button>
                    <button onclick="saveAndNext()" class="bg-blue-600 text-white px-8 py-2 rounded">Save & Next</button>
                </div>
            </div>
            <div class="w-80 bg-gray-50 border-l p-4" id="right-panel-id">
                <div class="font-bold mb-4">Question Palette</div>
                <div id="palette-wrapper" class="grid grid-cols-5 gap-2"></div>
            </div>
        </div>
    </div>

    <div id="revision-screen" style="display:none;" class="flex-col h-full bg-[#f4f7f6]">
        <header class="p-4 border-b flex justify-between items-center bg-white shadow-sm">
            <button onclick="goHomeAlert()" class="bg-gray-100 p-2 rounded">🏠 Dashboard</button>
            <div class="font-bold text-purple-700">VU REVISION ENGINE</div>
            <div></div>
        </header>
        <div id="revision-feed-container" class="flex-1 overflow-y-auto p-6 max-w-4xl mx-auto w-full"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
