<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAM ENGINE: The VU Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0f172a]">

    <div id="pause-overlay" style="display:none;" class="fixed inset-0 z-[10000] bg-white/80 backdrop-blur-md flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-2xl text-center border-t-8 border-blue-600 max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-4">Test Paused ⏸️</h2>
            <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg" onclick="resumeTest()">Resume Test</button>
        </div>
    </div>

    <div id="lock-screen" style="display: flex;" class="fixed inset-0 z-[9999] bg-[#0f172a] items-center justify-center p-4">
        <div class="relative bg-slate-800/80 backdrop-blur-xl border border-slate-700 p-12 rounded-3xl shadow-2xl w-full max-w-xl text-center">
            <div class="w-20 h-20 mx-auto bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
                <span class="text-3xl font-black text-white">VU</span>
            </div>
            <h2 class="text-4xl font-black text-white mb-2 uppercase tracking-tighter">Exam Engine</h2>
            <p class="text-blue-400 font-bold tracking-widest uppercase text-sm mb-8">Secure Access Portal</p>
            <div class="relative mb-8 text-left">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Access Key</label>
                <div class="relative flex items-center">
                    <input type="password" id="pin-input" class="w-full bg-slate-900/80 border border-slate-600 text-white px-6 py-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-xl tracking-widest" placeholder="••••••••">
                    <button onclick="togglePassword()" id="eye-icon" class="absolute right-4 text-2xl">👁️</button>
                </div>
            </div>
            <button id="unlock-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all" onclick="verifyPin()">Initialize Engine</button>
        </div>
    </div>

    <div id="home-screen" style="display: none;" class="h-full w-full bg-gradient-to-br from-[#181B2D] to-[#09111A] flex flex-col overflow-hidden">
        <header class="w-full bg-[#181B2D]/95 backdrop-blur-md border-b border-[#394054] p-5 flex items-center justify-between z-50">
            <div class="flex items-center gap-4">
                <img id="home-logo" src="VU-logo.jpg" class="w-14 h-14 rounded-xl border border-white/10" onerror="this.src='https://via.placeholder.com/60'">
                <div>
                    <h1 class="text-2xl font-bold text-white leading-tight">EXAM ENGINE</h1>
                    <div id="db-stats" class="text-xs text-gray-400">Loading Intelligence...</div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="default-lang-select" onchange="saveTestState()" class="bg-slate-800 text-white px-3 py-2 rounded-lg outline-none">
                    <option value="hi">Hindi</option><option value="en">English</option>
                </select>
                <button onclick="lockEngine()" class="bg-red-500/10 text-red-400 border border-red-500/30 p-2 rounded-full">🔒</button>
            </div>
        </header>
        <main class="flex-1 overflow-y-auto p-6 space-y-6">
            <button class="w-full bg-gradient-to-r from-purple-800 to-indigo-700 py-10 rounded-2xl text-white font-black text-3xl shadow-xl hover:scale-[1.01] transition-transform" onclick="openRevisionPage()">THE VU REVISION</button>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                 <div class="md:col-span-3 bg-slate-800/40 p-6 rounded-2xl border border-slate-700 flex justify-between items-center">
                    <h3 class="text-indigo-200 font-bold">Cloud Sync</h3>
                    <div class="flex gap-2">
                        <button onclick="pushToCloud()" id="cloud-push-btn" class="border border-amber-400 text-amber-400 px-6 py-2 rounded-xl hover:bg-amber-400/10">Push</button>
                        <button onclick="pullFromCloud()" id="cloud-pull-btn" class="border border-sky-400 text-sky-400 px-6 py-2 rounded-xl hover:bg-sky-400/10">Restore</button>
                    </div>
                 </div>
                 <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700 text-center flex flex-col">
                    <h3 class="text-yellow-300 font-bold mb-4">Full Mock</h3>
                    <button onclick="startExam('mock','all')" class="w-full bg-transparent border border-yellow-500 text-yellow-400 py-3 rounded-xl mt-auto">Start Mock</button>
                 </div>
                 <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700 text-center flex flex-col">
                    <h3 class="text-pink-300 font-bold mb-2">Sprint</h3>
                    <select id="sprint-subject" class="mb-4 bg-slate-900 text-white p-2 rounded w-full"></select>
                    <button onclick="startExam('sprint', document.getElementById('sprint-subject').value)" class="w-full bg-transparent border border-pink-500 text-pink-400 py-3 rounded-xl mt-auto">Start Sprint</button>
                 </div>
                 <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700 text-center flex flex-col">
                    <h3 class="text-green-300 font-bold mb-2">Practice</h3>
                    <select id="practice-subject" class="mb-4 bg-slate-900 text-white p-2 rounded w-full"></select>
                    <button onclick="startExam('practice', document.getElementById('practice-subject').value)" class="w-full border border-green-500 text-green-400 py-3 rounded-xl mt-auto">Start Practice</button>
                 </div>
                 <button onclick="startCalculationMode()" id="calc-btn" class="md:col-span-3 border border-purple-500 text-purple-400 py-4 rounded-2xl font-black text-xl hover:bg-purple-500/10">START CALC DRILLS</button>
            </div>
        </main>
    </div>

    <div id="analysis-screen" style="display: none;" class="h-full w-full bg-[#0a0310] flex-col overflow-hidden">
        <header class="p-5 border-b border-purple-900/50 flex justify-between items-center bg-[#130724]">
            <button onclick="goHomeAlert()" class="bg-purple-900/30 text-purple-200 border border-purple-700 px-4 py-2 rounded-xl text-sm font-bold">Dashboard</button>
            <div class="text-xl font-black text-white">VU || ANALYTICS</div>
            <button onclick="startReviewMode()" class="bg-fuchsia-600 text-white px-4 py-2 rounded-xl text-sm font-bold">👁️ Solutions</button>
        </header>
        <main class="flex-1 overflow-y-auto p-6">
            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
                    <div class="bg-[#1e103c] p-5 rounded-xl text-center border border-purple-500/30"><div class="text-xs text-purple-300 mb-1 font-bold">SCORE</div><div id="dash-score" class="text-4xl font-black text-white">0</div></div>
                    <div class="bg-[#152e23] p-5 rounded-xl text-center border border-emerald-500/30"><div class="text-xs text-emerald-300 mb-1 font-bold">CORRECT</div><div id="dash-correct" class="text-4xl font-black text-emerald-400">0</div></div>
                    <div class="bg-[#35151e] p-5 rounded-xl text-center border border-rose-500/30"><div class="text-xs text-rose-300 mb-1 font-bold">WRONG</div><div id="dash-wrong" class="text-4xl font-black text-rose-400">0</div></div>
                </div>
                <div id="detailed-stats-area"></div>
                <div class="mt-10 bg-black p-5 rounded-xl border border-purple-800">
                    <textarea id="insight-text" readonly class="w-full bg-transparent text-emerald-400 font-mono h-32 outline-none resize-none"></textarea>
                </div>
            </div>
        </main>
    </div>

    <div id="cbt-screen" style="display: none; flex-direction: column; height: 100%; background: #fff;">
        <header class="p-4 border-b flex justify-between items-center bg-gray-50">
            <button onclick="goHomeAlert()" class="bg-white border px-3 py-1 rounded font-bold hover:bg-gray-100">🏠 Home</button>
            <div id="timer" class="text-2xl font-mono font-bold bg-blue-600 text-white px-6 py-1 rounded shadow-inner">00:00</div>
            <button onclick="submitExamManually()" class="bg-green-600 text-white px-8 py-1 rounded font-bold hover:bg-green-700 shadow-md">Submit</button>
        </header>
        <div style="display: flex; flex: 1; overflow: hidden;">
            <div style="flex: 1; padding: 30px; overflow-y: auto;">
                <div style="font-weight: bold; margin-bottom: 5px; color: #1664c0;">Question <span id="q-num-display">1</span></div>
                <div id="q-text" style="font-size: 1.3rem; margin-bottom: 30px; color: #333;">Loading...</div>
                <div id="options-container" class="space-y-3"></div>
                <div style="margin-top: 40px; display: flex; gap: 15px;">
                    <button onclick="loadPrevious()" class="border-2 px-10 py-2 rounded-xl font-bold">Previous</button>
                    <button onclick="saveAndNext()" class="bg-blue-600 text-white px-12 py-2 rounded-xl font-bold">Save & Next</button>
                </div>
            </div>
            <div style="width: 280px; background: #f9f9f9; border-left: 1px solid #ccc; padding: 15px;" id="right-panel-id">
                <div style="font-weight: bold; margin-bottom: 15px; text-transform: uppercase; font-size: 0.8rem; color: #888;">Question Palette</div>
                <div id="palette-wrapper" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;"></div>
            </div>
        </div>
    </div>

    <div id="revision-screen" style="display:none;" class="flex-col h-full bg-[#f4f7f6]">
        <header class="p-4 border-b flex justify-between items-center bg-[#181B2D] text-white">
            <button onclick="goHomeAlert()" class="bg-white/10 hover:bg-white/20 border border-white/20 px-4 py-1 rounded-lg text-sm font-bold transition-colors">🏠 Dashboard</button>
            <div class="font-black tracking-widest text-lg">VU REVISION ENGINE</div>
            <div class="w-20"></div>
        </header>
        <div id="revision-feed-container" class="flex-1 overflow-y-auto p-6 max-w-4xl mx-auto w-full"></div>
    </div>

    <div id="revision-slider" style="position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); transform: translateY(100%); transition: 0.3s; z-index: 10000; max-height: 80vh; overflow-y: auto;">
        <div onclick="closeSlider()" style="background: #1664c0; color: white; padding: 10px; text-align: center; font-weight: bold; cursor: pointer;">▼ Hide Solution</div>
        <div id="slider-content" style="padding: 20px;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
